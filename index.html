<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radio App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #111;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.menu {
  margin: 15px 0;
  cursor: pointer;
  color: #bbb;
}

.menu:hover {
  color: white;
}

/* Main */
.main {
  flex: 1;
  background: #f5f5f5;
  padding: 20px;
}

/* Cards */
.card-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card:hover {
  transform: scale(1.03);
}

/* Player */
.player {
  position: fixed;
  bottom: 0;
  left: 220px;
  right: 0;
  background: #222;
  color: white;
  padding: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🎧 Radio</h2>
  <div class="menu">Home</div>
  <div class="menu">Live Radio</div>
  <div class="menu">Podcasts</div>
</div>

<div class="main">
  <h1>Live Stations</h1>

  <div class="card-container">
    <div class="card">🎵 Chill FM</div>
    <div class="card">🔥 Rock Station</div>
    <div class="card">📻 News Radio</div>
    <div class="card">🎧 Pop Hits</div>
    <div class="card">🌙 Relax Music</div>
    <div class="card">🚀 EDM Beats</div>
  </div>
</div>

<div class="player">
  ▶ Now Playing: Chill FM
</div>

</body>
</html>
