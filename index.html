<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radio App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  min-height: 100vh;
  background: black;
}

.sidebar {
  width: 220px;
  background: rgba(0, 0, 0, 0.9);
  color: white;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar h2 {
  margin-top: 0;
  margin-bottom: 30px;
}

.sidebar div {
  margin: 14px 0;
  color: #ddd;
}

.main {
  flex: 1;
  padding: 24px;
  padding-bottom: 120px;
  background: url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4");
  background-size: cover;
  background-position: center;
}

.section {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-radius: 16px;
  padding: 20px;
  max-width: 760px;
  color: white;
}

h1 {
  margin-top: 0;
  margin-bottom: 20px;
}

h2 {
  margin-top: 28px;
  margin-bottom: 14px;
}

.card {
  background: rgba(255,255,255,0.92);
  color: #111;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  cursor: pointer;
}

.event-card {
  background: rgba(255,255,255,0.18);
  color: white;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
}

.event-card h3 {
  margin: 0 0 8px 0;
  font-size: 18px;
}

.event-card p {
  margin: 6px 0;
}

.player {
  position: fixed;
  bottom: 0;
  left: 220px;
  right: 0;
  background: rgba(20,20,20,0.95);
  color: white;
  padding: 12px 16px;
  box-sizing: border-box;
}

#audioPlayer {
  width: 100%;
  max-width: 460px;
  margin-top: 8px;
}

@media (max-width: 700px) {
  body {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
  }

  .player {
    left: 0;
  }

  .section {
    max-width: 100%;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🎧 Radio</h2>
  <div>Home</div>
  <div>Live</div>
  <div>Podcasts</div>
  <div>Events</div>
</div>

<div class="main">
  <div class="section">
    <h1>Live Stations</h1>

    <div class="card" onclick="playStation('chill')">Chill FM</div>
    <div class="card" onclick="playStation('rock')">Rock Station</div>
    <div class="card" onclick="playStation('news')">News Radio</div>

    <h2>Upcoming Events</h2>

    <div class="event-card">
      <h3>Friday Night Jazz</h3>
      <p>Date: April 12, 2026</p>
      <p>Time: 8:00 PM</p>
    </div>

    <div class="event-card">
      <h3>Morning News Talk</h3>
      <p>Date: April 14, 2026</p>
      <p>Time: 9:00 AM</p>
    </div>
  </div>
</div>

<div class="player">
  <div id="nowPlaying">Now Playing: Select a station</div>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
function playStation(station) {
  let player = document.getElementById("audioPlayer");
  let nowPlaying = document.getElementById("nowPlaying");

  if (station === "chill") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
    nowPlaying.innerText = "Now Playing: Chill FM";
  }

  if (station === "rock") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
    nowPlaying.innerText = "Now Playing: Rock Station";
  }

  if (station === "news") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
    nowPlaying.innerText = "Now Playing: News Radio";
  }

  player.play();
}
</script>

</body>
</html>
