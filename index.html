<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radio App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  min-height: 100vh;
  background: #000;
}

.sidebar {
  width: 220px;
  background: #0b0b0b;
  color: white;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar h2 {
  margin-top: 0;
  margin-bottom: 30px;
}

.sidebar div {
  margin: 14px 0;
  color: #d9d9d9;
}

.main {
  flex: 1;
  padding: 24px;
  padding-bottom: 130px;
  background: linear-gradient(135deg, #1c1c1c, #3d1f1f, #111827);
}

.section {
  max-width: 760px;
  color: white;
}

h1 {
  margin-top: 0;
  margin-bottom: 20px;
  font-size: 40px;
}

h2 {
  margin-top: 30px;
  margin-bottom: 14px;
  font-size: 24px;
}

.card {
  background: rgba(255,255,255,0.12);
  color: white;
  padding: 16px;
  margin: 12px 0;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.12);
}

.event-card {
  background: rgba(255,255,255,0.08);
  color: white;
  padding: 16px;
  margin: 12px 0;
  border-radius: 14px;
  border-left: 4px solid #ff7a59;
}

.event-card h3 {
  margin: 0 0 8px 0;
}

.event-card p {
  margin: 6px 0;
}

.player {
  position: fixed;
  bottom: 100px;
  left: 220px;
  right: 0;
  background: #121212;
  color: white;
  padding: 12px 16px;
  box-sizing: border-box;
  border-top: 1px solid rgba(255,255,255,0.08);
}

#audioPlayer {
  width: 100%;
  max-width: 460px;
  margin-top: 8px;
}

@media (max-width: 700px) {
  body {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
  }

  .player {
    left: 0;
  }

  h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🎧 Radio</h2>
  <div>Home</div>
  <div>Live</div>
  <div>Podcasts</div>
  <div>Events</div>
</div>

<div class="main">
  <div class="section">
    <h1>My Radio App</h1>

    <div class="card" onclick="playStation('chill')">Chill FM</div>
    <div class="card" onclick="playStation('rock')">Rock Station</div>
    <div class="card" onclick="playStation('news')">News Radio</div>

    <h2>Upcoming Events</h2>

    <div class="event-card">
      <h3>Friday Night Jazz</h3>
      <p>Date: April 12</p>
      <p>Time: 8:00 PM</p>
      <p>Live guest performance.</p>
    </div>

    <div class="event-card">
      <h3>Morning Talk Show</h3>
      <p>Date: April 14</p>
      <p>Time: 9:00 AM</p>
      <p>Weekly news and discussion.</p>
    </div>
  </div>
</div>

<div class="player">
  <div id="nowPlaying">Now Playing: Select a station</div>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
function playStation(station) {
  let player = document.getElementById("audioPlayer");
  let nowPlaying = document.getElementById("nowPlaying");

  if (station === "chill") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
    nowPlaying.innerText = "Now Playing: Chill FM";
  }

  if (station === "rock") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
    nowPlaying.innerText = "Now Playing: Rock Station";
  }

  if (station === "news") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
    nowPlaying.innerText = "Now Playing: News Radio";
  }

  player.play();
}
</script>

</body>
</html>
