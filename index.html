<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radio App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 220px;
  background: #111;
  color: white;
  padding: 20px;
}

/* main */
.main {
  flex: 1;
  padding: 20px;
  background: url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4");
  background-size: cover;
  background-position: center;
}

/* cards */
.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.player {
  position: fixed;
  bottom: 0;
  left: 220px;
  right: 0;
  background: #222;
  color: white;
  padding: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🎧 Radio</h2>
  <div>Home</div>
  <div>Live</div>
  <div>Podcasts</div>
</div>

<div class="main">
  <h1>Live Stations</h1>

  <div class="card" onclick="playStation('chill')">Chill FM</div>
  <div class="card" onclick="playStation('rock')">Rock Station</div>
  <div class="card" onclick="playStation('news')">News Radio</div>
</div>

<div class="player">
  Now Playing: Chill FM
  <br><br>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
function playStation(station) {
  let player = document.getElementById("audioPlayer");

  if (station === "chill") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
  }

  if (station === "rock") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
  }

  if (station === "news") {
    player.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
  }

  player.play();
}
</script>

</body>
</html>
